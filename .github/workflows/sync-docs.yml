name: Sync Flutter Docs to Supabase

on:
  # 매주 월/목 오전 9시 (한국 시간) 실행
  schedule:
    - cron: '0 0 * * 1,4'  # UTC 00:00 = KST 09:00

  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      full_sync:
        description: '전체 재동기화 (모델 변경 후 등 필요 시 체크)'
        required: false
        default: false
        type: boolean

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./supabase-backend
        run: npm install

      - name: Run sync
        working-directory: ./supabase-backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          if [ "${{ inputs.full_sync }}" = "true" ]; then
            echo "🔄 전체 재동기화 시작..."
            npm run sync -- --full
          else
            echo "🔄 증분 동기화 시작..."
            npm run sync
          fi

      - name: Report success
        if: success()
        run: echo "✅ 동기화 성공"

      - name: Report failure
        if: failure()
        run: |
          echo "❌ 동기화 실패 - 원인을 확인하세요"
          echo "가능한 원인:"
          echo "  1. HF_API_KEY 만료 또는 권한 없음"
          echo "  2. SUPABASE_URL / SUPABASE_SERVICE_KEY 오류"
          echo "  3. 성공률 50% 미만 (임베딩 API 오류)"
          exit 1
